apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: weather-app

  namespace: argocd

spec:

  project: default

  source:

    repoURL: https://github.com/Faiz-official/weather-app-gitops.git

    targetRevision: HEAD

    path: .

  destination:

    server: https://kubernetes.default.svc

    namespace: weather

  syncPolicy:

    automated:

      prune: true

      selfHeal: true
